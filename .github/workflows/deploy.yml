name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Sync S3/AWS env vars from GitHub secrets/vars into Vercel's project
      # environment settings so they are available to the serverless runtime.
      # The env: block on vercel build only covers the CI process, not runtime.
      - name: Sync S3 environment variables to Vercel runtime
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          sync_env() {
            local key="$1" value="$2"
            # Remove existing entry (ignore errors when not present)
            vercel env rm "$key" production --yes --token="$VERCEL_TOKEN" 2>/dev/null || true
            printf '%s' "$value" | vercel env add "$key" production --token="$VERCEL_TOKEN"
          }
          sync_env S3_BUCKET            "${{ vars.S3_BUCKET }}"
          sync_env S3_REGION            "${{ vars.S3_REGION }}"
          sync_env S3_ENDPOINT          "${{ vars.S3_ENDPOINT }}"
          sync_env AWS_ACCESS_KEY_ID    "${{ secrets.AWS_ACCESS_KEY_ID }}"
          sync_env AWS_SECRET_ACCESS_KEY "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
