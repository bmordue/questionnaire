# nginx reverse proxy — local development configuration
#
# Architecture:
#   Browser → nginx (port 8080)
#               ├── auth_request → oauth2-proxy (port 4180)
#               │       └── OIDC flow → Dex (port 5556)
#               └── proxy_pass → questionnaire service (port 3000)
#
# Identity headers set for the questionnaire service after successful auth:
#   Remote-User   ← X-Auth-Request-Email  (primary identity, e.g. admin@example.com)
#   Remote-Name   ← X-Auth-Request-User   (display name / username)
#   Remote-Groups ← X-Auth-Request-Groups (comma-separated groups, empty for Dex static users)
#
# All runtime files (pid, logs, temp) are written under /tmp/questionnaire-dev/nginx/
# so that nginx can run as a non-root user without touching system directories.

worker_processes 1;

pid       /tmp/questionnaire-dev/nginx/nginx.pid;
error_log /tmp/questionnaire-dev/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # All temp and log paths use /tmp so nginx works without root
    client_body_temp_path /tmp/questionnaire-dev/nginx/client_body_temp;
    proxy_temp_path        /tmp/questionnaire-dev/nginx/proxy_temp;
    fastcgi_temp_path      /tmp/questionnaire-dev/nginx/fastcgi_temp;
    uwsgi_temp_path        /tmp/questionnaire-dev/nginx/uwsgi_temp;
    scgi_temp_path         /tmp/questionnaire-dev/nginx/scgi_temp;

    access_log /tmp/questionnaire-dev/nginx/access.log;

    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    server {
        listen 127.0.0.1:8080;
        server_name localhost;

        # ── oauth2-proxy endpoints ──────────────────────────────────────────
        # Handles login, logout, and OIDC callback.  The browser is redirected
        # here during the authentication flow.
        location /oauth2/ {
            proxy_pass              http://127.0.0.1:4180;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto       $scheme;
            # Tell oauth2-proxy where to send the browser after sign-in
            # Include the original host *and* port in the redirect header so
            # oauth2-proxy sees the exact origin the browser used.  Use
            # $http_host (preserves port when present) instead of $host.
            proxy_set_header X-Auth-Request-Redirect $scheme://$http_host$request_uri;
        }

        # ── auth_request sub-request endpoint ──────────────────────────────
        # This internal location is used exclusively by nginx's auth_request
        # directive. It must NOT forward the request body (only headers matter
        # for session validation), otherwise oauth2-proxy waits for the body of
        # POST/PUT requests and times out, returning 504 to the client.
        location = /oauth2/auth {
            internal;
            proxy_pass              http://127.0.0.1:4180;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto       $scheme;
            # Drop the request body — auth checks only need headers/cookies.
            proxy_pass_request_body off;
            proxy_set_header Content-Length          "";
        }

        # ── Application logout ─────────────────────────────────────────────
        # Intercept /logout before it reaches the questionnaire service so that
        # the oauth2-proxy session cookie is cleared.  Without this, clicking
        # "Sign out" redirects back to / while the session is still valid, and
        # the user stays logged in.
        #
        # Flow:
        #   1. Browser → GET /logout (this block)
        #   2. Redirect → /oauth2/sign_out?rd=/  (oauth2-proxy clears cookie)
        #   3. oauth2-proxy redirects browser → /
        #   4. auth_request on / → 401 (session now gone)
        #   5. nginx → @sign_in → /oauth2/sign_in  → Dex login form
        location = /logout {
            return 302 /oauth2/sign_out?rd=/;
        }

        # ── Application ────────────────────────────────────────────────────
        location / {
            # Forward-auth check: nginx asks oauth2-proxy whether the current
            # session is valid before letting the request through.
            auth_request /oauth2/auth;

            # On unauthenticated (401), redirect browser to the sign-in page.
            # The 'rd' parameter tells oauth2-proxy where to send the user back
            # after a successful login.
            error_page 401 = @sign_in;

            # Capture the identity headers from oauth2-proxy's auth response
            auth_request_set $questionnaire_remote_user   $upstream_http_x_auth_request_email;
            auth_request_set $questionnaire_remote_name   $upstream_http_x_auth_request_user;
            auth_request_set $questionnaire_remote_groups $upstream_http_x_auth_request_groups;

            # Overwrite any client-supplied identity headers (prevents spoofing),
            # then inject the proxy-validated values.
            # Remote-Email is explicitly cleared because auth.ts uses it as a
            # fallback for Remote-User; clearing it prevents a malicious client
            # from injecting a fake identity through that header.
            proxy_set_header Remote-User   $questionnaire_remote_user;
            proxy_set_header Remote-Name   $questionnaire_remote_name;
            proxy_set_header Remote-Groups $questionnaire_remote_groups;
            proxy_set_header Remote-Email  "";

            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header Host              $host;

            proxy_pass http://127.0.0.1:3000;
        }

        location @sign_in {
            # Use a relative rd value (the original request URI) so oauth2-proxy
            # does not see a nested absolute redirect URL which it rejects.
            return 302 /oauth2/sign_in?rd=$request_uri;
        }
    }
}
