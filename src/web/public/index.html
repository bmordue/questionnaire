<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questionnaires</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="brand" href="index.html">📋 Questionnaires</a>
  <a href="index.html">Home</a>
  <a href="builder.html">Builder</a>
  <a href="responses.html">Responses</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Questionnaires</h1>
    <div style="display:flex;gap:0.5rem">
      <button class="btn btn-outline" id="uploadBtn" aria-label="Upload questionnaire from JSON file">⬆ Upload JSON</button>
      <input type="file" id="uploadInput" accept=".json,application/json" style="display:none" aria-label="Select JSON questionnaire file" />
      <a href="builder.html" class="btn btn-primary">+ New Questionnaire</a>
    </div>
  </div>

  <div id="alert" class="alert hidden"></div>
  <div id="list" class="card-grid"></div>
</div>

<script src="app.js"></script>
<script>
// ── Upload JSON ───────────────────────────────────────────────────────────────
document.getElementById('uploadBtn').addEventListener('click', () => {
  document.getElementById('uploadInput').click();
});

document.getElementById('uploadInput').addEventListener('change', async (event) => {
  const alertEl = document.getElementById('alert');
  const file = event.target.files[0];
  if (!file) return;

  // Reset input so the same file can be re-selected if needed
  event.target.value = '';

  let parsed;
  try {
    const text = await file.text();
    parsed = JSON.parse(text);
  } catch (err) {
    showAlert(alertEl, 'Invalid JSON file. Please select a valid JSON questionnaire.');
    return;
  }

  // Check for duplicate ID and confirm before overwriting
  if (parsed.id) {
    try {
      const existing = await apiFetch('/api/questionnaires');
      const duplicate = existing.find(q => q.id === parsed.id);
      if (duplicate) {
        const title = duplicate.title ?? parsed.metadata?.title ?? parsed.title ?? 'this questionnaire';
        if (!confirm(`A questionnaire named "${title}" (id: ${parsed.id}) already exists. Overwrite it?`)) {
          return;
        }
      }
    } catch {
      // If we can't fetch the list, proceed anyway and let the server handle it
    }
  }

  try {
    await apiFetch('/api/questionnaires', { method: 'POST', body: JSON.stringify(parsed) });
    showAlert(alertEl, 'Questionnaire uploaded successfully!', 'success');
    // Reload the list after a short delay
    setTimeout(() => location.reload(), 1000);
  } catch (err) {
    // Surface Zod validation details when available.
    // The server returns { error: string, details: ZodError } where ZodError has an issues array.
    const issues = err.responseData?.details?.issues;
    let msg = 'Upload failed: ' + err.message;
    if (Array.isArray(issues) && issues.length > 0) {
      msg += ' — ' + issues.map(i => (i.path?.length ? i.path.join('.') + ': ' : '') + i.message).join('; ');
    }
    showAlert(alertEl, msg);
  }
});

(async () => {
  const listEl = document.getElementById('list');
  const alertEl = document.getElementById('alert');

  let questionnaires = [];
  try {
    questionnaires = await apiFetch('/api/questionnaires');
  } catch (err) {
    showAlert(alertEl, 'Failed to load questionnaires: ' + err.message);
    return;
  }

  if (questionnaires.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <h3>No questionnaires yet</h3>
        <p>Create your first questionnaire using the Builder.</p>
        <a href="builder.html" class="btn btn-primary mt-2">Open Builder</a>
      </div>`;
    return;
  }

  listEl.innerHTML = questionnaires.map(q => `
    <div class="card">
      <div class="card-title">${esc(q.title)}</div>
      ${q.description ? `<div class="card-sub">${esc(q.description)}</div>` : ''}
      <div class="card-sub mt-1">Updated: ${fmtDate(q.updatedAt)}</div>
      ${q.tags && q.tags.length ? `<div class="card-tags">${q.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="card-actions">
        <a href="runner.html?id=${encodeURIComponent(q.id)}" class="btn btn-primary">▶ Run</a>
        <a href="builder.html?id=${encodeURIComponent(q.id)}" class="btn btn-outline">✏ Edit</a>
        <a href="responses.html?questionnaireId=${encodeURIComponent(q.id)}" class="btn btn-ghost">📄 Responses</a>
        <button class="btn btn-danger btn-delete" data-id="${esc(q.id)}" aria-label="Delete questionnaire">🗑</button>
      </div>
    </div>
  `).join('');

  const deleteButtons = listEl.querySelectorAll('.btn-delete');
  deleteButtons.forEach(btn => {
    btn.addEventListener('click', (event) => {
      const target = event.currentTarget;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.id ?? '';
      deleteQ(id, target);
    });
  });
})();

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function deleteQ(id, btn) {
  if (!confirm('Delete this questionnaire?')) return;
  btn.disabled = true;
  try {
    await apiFetch('/api/questionnaires/' + encodeURIComponent(id), { method: 'DELETE' });
    location.reload();
  } catch (err) {
    alert('Delete failed: ' + err.message);
    btn.disabled = false;
  }
}
</script>
</body>
</html>
